<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>놀자프린트 | 무료 키즈 프린트 학습지</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fffaf0;
      color: #333;
    }

    header {
      padding: 24px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 28px;
      font-weight: bold;
      color: #ff8a3d;
    }

    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: #555;
      font-weight: bold;
    }

    .hero {
      text-align: center;
      padding: 80px 20px 60px;
      background: linear-gradient(180deg, #fff3d6, #fffaf0);
    }

    .hero h1 {
      font-size: 48px;
      margin-bottom: 16px;
      color: #ff7a1a;
    }

    .hero p {
      font-size: 22px;
      margin-bottom: 32px;
      color: #555;
    }

    .button {
      display: inline-block;
      padding: 16px 28px;
      background: #ff8a3d;
      color: white;
      border-radius: 999px;
      text-decoration: none;
      font-weight: bold;
      font-size: 18px;
    }

    .section {
      max-width: 1000px;
      margin: 60px auto;
      padding: 0 20px;
    }

    .section h2 {
      text-align: center;
      font-size: 32px;
      margin-bottom: 32px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 28px;
      border-radius: 24px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      text-align: center;
    }

    .card .emoji {
      font-size: 42px;
      margin-bottom: 12px;
    }

    .card h3 {
      margin: 10px 0;
      font-size: 22px;
    }

    .card p {
      color: #666;
      line-height: 1.5;
    }

    footer {
      text-align: center;
      padding: 40px 20px;
      color: #777;
      background: #fff3d6;
      margin-top: 60px;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">놀자프린트</div>
    <nav>
      <a href="#">색칠공부</a>
      <a href="#">미로찾기</a>
      <a href="#">점잇기</a>
      <a href="#">학습지</a>
    </nav>
  </header>

  <section class="hero">
    <h1>프린트 한 장으로 시작하는 즐거운 배움</h1>
    <p>아이에게 바로 출력해 줄 수 있는 무료 놀이 학습지</p>
    <a class="button" href="#contents">무료 자료 둘러보기</a>
  </section>

  <section class="section" id="contents">
    <h2>오늘의 프린트 자료</h2>

    <div class="cards">
      <div class="card">
      <div class="emoji">🎨</div>
    
      <h3>
        <a href="coloring-dinosaur.html">
          색칠공부
        </a>
      </h3>
    
      <p>
        공룡, 동물, 자동차, 유니콘 등 아이가 좋아하는 색칠 도안
      </p>
      </div>

      <div class="card">
        <div class="emoji">🧩</div>
        <h3>미로찾기</h3>
        <p>집중력과 문제 해결력을 키워주는 재미있는 미로 놀이</p>
      </div>

      <div class="card">
        <div class="emoji">🔢</div>
        <h3>점잇기</h3>
        <p>숫자 순서대로 이어가며 그림을 완성하는 활동지</p>
      </div>

      <div class="card">
        <div class="emoji">✏️</div>
        <h3>한글·숫자 학습</h3>
        <p>초등 저학년과 유아를 위한 기초 학습 프린트</p>
      </div>
    </div>
  </section>

  <footer>
    © 2026 놀자프린트 · 무료 키즈 프린트 학습지
  </footer>
</body>
</html>

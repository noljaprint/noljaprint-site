<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>온라인 색칠하기 | 놀자프린트</title>
  <meta name="description" content="놀자프린트 온라인 색칠하기 페이지입니다. 색칠공부 도안을 화면에서 직접 색칠하고 저장하거나 프린트할 수 있습니다.">

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-H37MBB00BG"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-H37MBB00BG');
  </script>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      line-height: 1.7;
      color: #333;
      background: #fffaf3;
    }

    h1 {
      color: #ff7a1a;
      text-align: center;
    }

    .top-link {
      display: inline-block;
      margin-bottom: 20px;
    }

    .palette {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin: 20px 0;
    }

    .color-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 3px solid #eee;
      cursor: pointer;
    }

    .color-btn.active {
      border: 4px solid #333;
    }

    .tool-box {
      text-align: center;
      margin: 20px 0;
    }

    .tool-box label {
      font-weight: bold;
      margin-right: 8px;
    }

    .canvas-wrap {
      position: relative;
      width: 100%;
      max-width: 850px;
      margin: 25px auto;
      border: 1px solid #ddd;
      border-radius: 12px;
      overflow: hidden;
      background: white;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
      touch-action: none;
    }

    #colorCanvas,
    #outlineCanvas {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
    }

    #colorCanvas {
      z-index: 1;
      cursor: crosshair;
      touch-action: none;
    }

    #outlineCanvas {
      z-index: 2;
      pointer-events: none;
    }

    #baseImage {
      display: none;
    }

    .action-area {
      text-align: center;
      margin: 25px 0;
    }

    .action-btn {
      background: #ff7a1a;
      color: white;
      border: none;
      padding: 14px 22px;
      border-radius: 8px;
      font-size: 17px;
      cursor: pointer;
      margin: 5px;
      font-weight: bold;
    }

    .gray-btn {
      background: #666;
    }

    .green-btn {
      background: #4CAF50;
    }

    .blue-btn {
      background: #2196F3;
    }

    .eraser-btn {
      background: #9E9E9E;
    }

    .guide-box {
      background: #fff8e1;
      border: 1px solid #ffd56b;
      border-radius: 12px;
      padding: 18px;
      margin-top: 30px;
    }

    @media print {
      .no-print {
        display: none;
      }

      body {
        background: white;
        margin: 0;
        max-width: none;
      }

      .canvas-wrap {
        box-shadow: none;
        border: none;
      }
    }
  </style>
</head>

<body>

  <a class="top-link no-print" href="javascript:history.back()">← 이전 페이지로</a>

  <h1 id="pageTitle">온라인 색칠하기</h1>

  <p class="no-print" style="text-align:center;">
    색을 고른 뒤 도안 위에서 마우스나 손가락으로 색칠해보세요.
  </p>

  <div class="palette no-print">
    <button class="color-btn active" style="background:#4CAF50;" onclick="setColor('#4CAF50', this)"></button>
    <button class="color-btn" style="background:#8BC34A;" onclick="setColor('#8BC34A', this)"></button>
    <button class="color-btn" style="background:#795548;" onclick="setColor('#795548', this)"></button>
    <button class="color-btn" style="background:#FFC107;" onclick="setColor('#FFC107', this)"></button>
    <button class="color-btn" style="background:#FF5722;" onclick="setColor('#FF5722', this)"></button>
    <button class="color-btn" style="background:#2196F3;" onclick="setColor('#2196F3', this)"></button>
    <button class="color-btn" style="background:#E91E63;" onclick="setColor('#E91E63', this)"></button>
    <button class="color-btn" style="background:#9C27B0;" onclick="setColor('#9C27B0', this)"></button>
    <button class="color-btn" style="background:#000000;" onclick="setColor('#000000', this)"></button>
    <button class="color-btn" style="background:#FFFFFF;" onclick="setColor('#FFFFFF', this)"></button>
  </div>

  <div class="tool-box no-print">
    <label for="brushSize">붓 굵기</label>
    <input id="brushSize" type="range" min="4" max="50" value="14" oninput="changeBrushSize(this.value)">
    <span id="brushSizeText">14</span>
  </div>

  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="colorCanvas"></canvas>
    <canvas id="outlineCanvas"></canvas>
    <img id="baseImage" src="" alt="온라인 색칠 도안">
  </div>

  <div class="action-area no-print">
    <button class="action-btn blue-btn" onclick="undo()">↩️ 되돌리기</button>
    <button class="action-btn eraser-btn" onclick="setEraser()">🧽 지우개</button>
    <button class="action-btn gray-btn" onclick="clearCanvas()">🗑️ 초기화</button>
    <button class="action-btn green-btn" onclick="downloadColoredImage()">💾 PNG 저장</button>
    <button class="action-btn" onclick="window.print()">🖨️ 프린트</button>
  </div>

  <div class="guide-box no-print">
    <h2>사용 방법</h2>
    <ol>
      <li>색상을 선택하세요.</li>
      <li>도안 위에서 마우스나 손가락으로 색칠하세요.</li>
      <li>도안 선은 항상 위에 보여서 색칠해도 가려지지 않습니다.</li>
      <li>완성하면 PNG 저장 또는 프린트로 출력해보세요.</li>
    </ol>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const imageFile = params.get('img');
    const title = params.get('title') || '온라인 색칠하기';

    const colorCanvas = document.getElementById('colorCanvas');
    const outlineCanvas = document.getElementById('outlineCanvas');
    const baseImage = document.getElementById('baseImage');
    const canvasWrap = document.getElementById('canvasWrap');

    const colorCtx = colorCanvas.getContext('2d');
    const outlineCtx = outlineCanvas.getContext('2d');

    let drawing = false;
    let currentColor = '#4CAF50';
    let brushSize = 14;
    let historyStack = [];

    document.getElementById('pageTitle').innerText = title + ' 온라인 색칠하기';

    if (imageFile) {
      baseImage.src = imageFile;
    } else {
      document.getElementById('pageTitle').innerText = '도안 이미지를 찾을 수 없습니다';
    }

    function setupCanvasSize() {
      const imageWidth = baseImage.naturalWidth;
      const imageHeight = baseImage.naturalHeight;
      const ratio = imageHeight / imageWidth;

      canvasWrap.style.height = canvasWrap.clientWidth * ratio + 'px';

      colorCanvas.width = imageWidth;
      colorCanvas.height = imageHeight;

      outlineCanvas.width = imageWidth;
      outlineCanvas.height = imageHeight;
    }

    function drawOutlineLayer() {
      outlineCtx.clearRect(0, 0, outlineCanvas.width, outlineCanvas.height);

      const tempCanvas = document.createElement('canvas');
      const tempCtx = tempCanvas.getContext('2d');

      tempCanvas.width = outlineCanvas.width;
      tempCanvas.height = outlineCanvas.height;

      tempCtx.drawImage(baseImage, 0, 0, tempCanvas.width, tempCanvas.height);

      const imageData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
      const data = imageData.data;

      for (let i = 0; i < data.length; i += 4) {
        const r = data[i];
        const g = data[i + 1];
        const b = data[i + 2];

        const brightness = (r + g + b) / 3;

        if (brightness < 235) {
          data[i] = 0;
          data[i + 1] = 0;
          data[i + 2] = 0;
          data[i + 3] = 255;
        } else {
          data[i + 3] = 0;
        }
      }

      outlineCtx.putImageData(imageData, 0, 0);
    }

    baseImage.onload = function () {
      setupCanvasSize();
      drawOutlineLayer();
      saveHistory();
    };

    window.addEventListener('resize', function () {
      if (!baseImage.naturalWidth) return;

      const imageWidth = baseImage.naturalWidth;
      const imageHeight = baseImage.naturalHeight;
      const ratio = imageHeight / imageWidth;

      canvasWrap.style.height = canvasWrap.clientWidth * ratio + 'px';
    });

    function setColor(color, button) {
      currentColor = color;

      document.querySelectorAll('.color-btn').forEach(btn => {
        btn.classList.remove('active');
      });

      button.classList.add('active');
    }

    function setEraser() {
      currentColor = 'eraser';

      document.querySelectorAll('.color-btn').forEach(btn => {
        btn.classList.remove('active');
      });
    }

    function changeBrushSize(size) {
      brushSize = Number(size);
      document.getElementById('brushSizeText').innerText = size;
    }

    function getPosition(event) {
      const rect = colorCanvas.getBoundingClientRect();

      let clientX;
      let clientY;

      if (event.touches && event.touches.length > 0) {
        clientX = event.touches[0].clientX;
        clientY = event.touches[0].clientY;
      } else {
        clientX = event.clientX;
        clientY = event.clientY;
      }

      return {
        x: (clientX - rect.left) * (colorCanvas.width / rect.width),
        y: (clientY - rect.top) * (colorCanvas.height / rect.height)
      };
    }

    function saveHistory() {
      if (historyStack.length > 20) {
        historyStack.shift();
      }

      historyStack.push(colorCanvas.toDataURL());
    }

    function startDrawing(event) {
      saveHistory();

      drawing = true;

      const pos = getPosition(event);

      colorCtx.beginPath();
      colorCtx.moveTo(pos.x, pos.y);

      event.preventDefault();
    }

    function draw(event) {
      if (!drawing) return;

      const pos = getPosition(event);

      colorCtx.lineWidth = brushSize * (colorCanvas.width / colorCanvas.getBoundingClientRect().width);
      colorCtx.lineCap = 'round';
      colorCtx.lineJoin = 'round';

      if (currentColor === 'eraser') {
        colorCtx.globalCompositeOperation = 'destination-out';
        colorCtx.globalAlpha = 1;
      } else {
        colorCtx.globalCompositeOperation = 'source-over';
        colorCtx.globalAlpha = 0.55;
        colorCtx.strokeStyle = currentColor;
      }

      colorCtx.lineTo(pos.x, pos.y);
      colorCtx.stroke();

      colorCtx.globalAlpha = 1;

      event.preventDefault();
    }

    function stopDrawing() {
      drawing = false;
      colorCtx.globalCompositeOperation = 'source-over';
      colorCtx.globalAlpha = 1;
    }

    function undo() {
      if (historyStack.length === 0) return;

      const previous = historyStack.pop();
      const img = new Image();

      img.onload = function () {
        colorCtx.clearRect(0, 0, colorCanvas.width, colorCanvas.height);
        colorCtx.drawImage(img, 0, 0, colorCanvas.width, colorCanvas.height);
      };

      img.src = previous;
    }

    function clearCanvas() {
      saveHistory();
      colorCtx.clearRect(0, 0, colorCanvas.width, colorCanvas.height);
    }

    function downloadColoredImage() {
      const tempCanvas = document.createElement('canvas');
      const tempCtx = tempCanvas.getContext('2d');

      tempCanvas.width = colorCanvas.width;
      tempCanvas.height = colorCanvas.height;

      tempCtx.fillStyle = '#ffffff';
      tempCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);

      tempCtx.drawImage(colorCanvas, 0, 0);
      tempCtx.drawImage(outlineCanvas, 0, 0);

      const fileName = title.replaceAll(' ', '-') + '-colored.png';

      const link = document.createElement('a');
      link.download = fileName;
      link.href = tempCanvas.toDataURL('image/png');
      link.click();
    }

    colorCanvas.addEventListener('mousedown', startDrawing);
    colorCanvas.addEventListener('mousemove', draw);
    colorCanvas.addEventListener('mouseup', stopDrawing);
    colorCanvas.addEventListener('mouseleave', stopDrawing);

    colorCanvas.addEventListener('touchstart', startDrawing, { passive: false });
    colorCanvas.addEventListener('touchmove', draw, { passive: false });
    colorCanvas.addEventListener('touchend', stopDrawing);
  </script>

</body>
</html>

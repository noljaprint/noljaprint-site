<body style="font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; line-height: 1.7;">

  <h1>티라노사우루스 색칠공부 도안</h1>

  <p>
    아이들이 좋아하는 공룡 중 하나인 <strong>티라노사우루스</strong> 색칠공부 도안입니다.

  </p>

<div style="text-align:center; margin:30px 0;">

  <div style="text-align:center; margin-bottom:30px;">
      <button
          onclick="window.print()"
          style="

  <h2>추천 연령</h2>

    <li>색칠 후 공룡 이야기를 만들어보기</li>

  <p>
    앞으로 티라노사우루스 외에도 트리케라톱스, 브라키오사우루스, 스테고사우루스 색칠공부 도안을 추가할 예정입니다.

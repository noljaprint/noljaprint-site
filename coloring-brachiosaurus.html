<!DOCTYPE html>

<head>

<body style="font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; line-height: 1.7;">

  <a href="coloring-dinosaur.html">← 공룡 색칠공부 목록으로</a>

  <h1>브라키오사우루스 색칠공부 도안</h1>

  <p>
    긴 목과 큰 몸집이 특징인 <strong>브라키오사우루스</strong> 색칠공부 도안입니다.
    집에서 바로 프린트해서 공룡 색칠놀이 자료로 활용해 보세요.
  </p>

  <div style="text-align:center; margin:30px 0;">
    <img
      src="brachiosaurus-coloring.png"

      style="max-width:100%; border:1px solid #ddd; border-radius:12px;"
    >
  </div>

  <div style="text-align:center; margin-bottom:30px;">
    <button
      onclick="window.print()"
      style="background:#ff7a1a; color:white; border:none; padding:15px 25px; border-radius:8px; font-size:18px; cursor:pointer;">
      🖨️ 도안 프린트하기

  <h2>추천 연령</h2>
  <p>5세, 6세, 7세, 초등 1학년 아이들에게 추천합니다.</p>

  <h2>활용 방법</h2>
  <ul>
    <li>공룡 이름을 함께 읽어보기</li>
    <li>긴 목과 몸통을 다른 색으로 색칠하기</li>
    <li>다른 공룡보다 목이 왜 긴지 이야기해보기</li>
  </ul>
